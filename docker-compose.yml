version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: civitas_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-civitas_prod}
      POSTGRES_USER: ${POSTGRES_USER:-civitas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CivitasSecurePassword2026!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-civitas_user} -d ${POSTGRES_DB:-civitas_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - civitas_net

  redis:
    image: redis:7-alpine
    container_name: civitas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civitas_net

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: civitas_opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD:-CivitasSearchAdmin2026!}
      - "DISABLE_SECURITY_PLUGIN=true"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - civitas_net

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: civitas_backend
    environment:
      PROJECT_NAME: "CivitasAI Human Civilization Forecasting Engine"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-civitas_user}:${POSTGRES_PASSWORD:-CivitasSecurePassword2026!}@postgres:5432/${POSTGRES_DB:-civitas_prod}"
      REDIS_URL: "redis://redis:6379/0"
      OPENSEARCH_URL: "http://opensearch:9200"
      PRIMARY_AI_MODEL: "${PRIMARY_AI_MODEL:-mock}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      SECRET_KEY: "${SECRET_KEY:-enterprise-production-secure-jwt-key-2026-civitas}"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - civitas_net

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
    container_name: civitas_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://nginx/api/v1
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - civitas_net

  nginx:
    image: nginx:1.25-alpine
    container_name: civitas_nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - civitas_net

volumes:
  postgres_data:
  redis_data:
  opensearch_data:

networks:
  civitas_net:
    driver: bridge
